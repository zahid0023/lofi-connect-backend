gohighlevel:
  client-id: 689b932c1e999f049e317c33-me8xkopq
  client-secret: 85aa301a-2002-455f-a477-5cffe54dedd7
  redirect-uri: http://localhost:8080/api/v1/authorization/redirect
  base-url: https://marketplace.gohighlevel.com
  code-url: oauth/chooselocation
  token-url: https://services.leadconnectorhq.com/oauth/token
  scopes:
    - contacts.readonly
    - contacts.write
